name: Deploy to shinyapps.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('shiny', 'rsconnect'), repos='https://cloud.r-project.org')"

      - name: Deploy to shinyapps.io
        env:
          RSCONNECT_TOKEN: ${{ secrets.RSCONNECT_TOKEN }}
          RSCONNECT_SECRET: ${{ secrets.RSCONNECT_SECRET }}
        run: |
          Rscript -e "
            rsconnect::setAccountInfo(
              name   = 'caj654',
              token  = Sys.getenv('RSCONNECT_TOKEN'),
              secret = Sys.getenv('RSCONNECT_SECRET')
            )
            rsconnect::deployApp(appDir = '.', appName = 'caj654.shinyapps.io/chroma')
          "
